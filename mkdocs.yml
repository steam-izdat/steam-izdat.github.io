site_name: STEAMиздат Гайд v2.0
site_url: https://steam-izdat.github.io/
site_description: >-
  Полевой мануал для инди-разработчиков, которые издают свои игры в Steam.
  Регистрация в Steamworks, работа из разных стран — России, Казахстана,
  Армении, Грузии и других, банки и выплаты, маркетинг, цены, статистика,
  частые ошибки.
site_author: Редакция STEAMиздат
copyright: >-
  Контент под лицензией
  <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.ru" rel="noopener" target="_blank">CC&nbsp;BY-NC-SA&nbsp;4.0</a>
  · STEAMиздат

# Репозиторий гайда — правки приветствуются
repo_name: steam-izdat.github.io
repo_url: https://github.com/steam-izdat/steam-izdat.github.io
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: ru
  font: false            # шрифты подключаем сами (Oswald / Lora / JetBrains Mono) — не Roboto
  favicon: assets/favicon.png
  logo: assets/logo.png
  icon:
    repo: material/source-branch
    edit: material/pencil-box-outline
  palette:
    # три режима по клику циклом: системная → светлая → тёмная.
    # светлая «бумага» базируется на Material default, тёмная «оператор» — на slate,
    # чтобы все компоненты (поиск, таблицы, код, сноски) унаследовали корректный свет/тьму
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: "Тема — как в системе (клик: светлая)"
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: "Светлая тема (клик: тёмная)"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: "Тёмная тема (клик: системная)"
  features:
    - navigation.tabs             # верхние табы-категории (как в клиенте Steam)
    - navigation.tabs.sticky      # табы прилипают вверху при прокрутке
    - navigation.indexes          # кликабельные обложки разделов
    - navigation.expand           # левое меню раздела раскрыто — видно все страницы сразу
    - navigation.top              # кнопка «наверх»
    - navigation.tracking         # url следует за прокруткой
    - navigation.footer           # назад/вперёд внизу
    - navigation.instant          # переходы без полной перезагрузки (быстрее на мобильном)
    - navigation.instant.progress # тонкая полоса загрузки при медленном соединении
    - navigation.path             # хлебные крошки — видно, где ты в гайде
    - toc.follow
    - search.suggest              # поиск достраивает слово (ищут точными терминами)
    - search.highlight            # подсветка найденного на странице
    - search.share
    - content.code.copy
    - content.tooltips
    - announce.dismiss            # верхнюю плашку «скачать PDF» можно закрыть

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/share.js
  - javascripts/calc-payout.js
  - javascripts/calc-discounts.js
  - javascripts/calc-timing.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html            # ОБЯЗАТЕЛЬНО: рендерит markdown внутри наших <div class="cl">
  - tables
  - toc:
      permalink: "#"
      permalink_title: Ссылка на этот раздел
      toc_depth: 3
      # человекочитаемые якоря на кириллице (армения, казахстан…) — иначе
      # дефолтный slugify вырезает кириллицу и заголовки получают мусорные id,
      # ломая прямые ссылки на разделы и приземление поиска
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:       # плоские монохромные иконки :material-...: (наследуют цвет текста)
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: ru
  # PDF-версия гайда: единый файл steam-izdat-guide.pdf, собирается при build
  # (движок — headless Chromium через Playwright). Для быстрого локального serve
  # отключай генерацию: MKDOCS_EXPORTER_PDF=false mkdocs serve
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, true]
          concurrency: 8
          stylesheets:
            - resources/stylesheets/pdf.scss
          aggregator:
            enabled: true
            output: steam-izdat-guide.pdf
            covers: none

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/+qWcZc4g1arRhMGY6
      name: Чат STEAMиздат
    - icon: fontawesome/brands/telegram
      link: https://t.me/nesteamizdat
      name: Канал «Уставший паблишинг»
    - icon: material/github
      link: https://github.com/steam-izdat
      name: GitHub STEAMиздат

# Навигация сгруппирована по ситуации читателя (а не по номерам разделов):
# верхние табы-категории, внутри — конкретные страницы.
nav:
  - Главная: index.md
  - Старт: 01-start/index.md
  - Деньги и страны:
      - Куда придут деньги — обзор: banks/index.md
      - По странам:
          - Россия:
              - 02-russia/index.md
              - Регистрация ИП и налоги: 02-russia/ip-registration.md
              - Райффайзенбанк: 02-russia/raiffeisenbank.md
              - Челябинвестбанк (архив): 02-russia/chelyabinvestbank.md
          - Армения: 03-other-countries/armenia.md
          - Беларусь: 03-other-countries/belarus.md
          - Грузия: 03-other-countries/georgia.md
          - Казахстан: 03-other-countries/kazakhstan.md
          - Кыргызстан: 03-other-countries/kyrgyzstan.md
          - Узбекистан: 03-other-countries/uzbekistan.md
          - Сербия: 03-other-countries/serbia.md
      - Релокация и нерезидентство: 03-other-countries/index.md
      - Цены и финансы: 05-pricing/index.md
  - Продвижение:
      - Маркетинг: 04-marketing/index.md
      - Оформление страницы в Steam: 04-marketing/store-page.md
      - Участие в фестивалях: 04-marketing/festivals.md
      - Календарь фестивалей 2026: 04-marketing/fest-calendar.md
      - Статистика: 06-statistics/index.md
  - Справка:
      - Инструменты и сообщества: 07-tools/index.md
      - Проблемы и ошибки: 08-problems/index.md
      - Термины: 09-terms/index.md
  - Калькуляторы:
      - calc/index.md
      - Сколько дойдёт до счёта: calc/payout.md
      - Планировщик скидок: calc/discounts.md
      - Тайминг по поясам: calc/timing.md
